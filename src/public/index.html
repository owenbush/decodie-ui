<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodie</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
</head>
<body>

<header class="app-header">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle filters">&#9776;</button>
    <h1><a href="#/" id="homeLink" style="display:flex;align-items:center;gap:0.5rem;color:inherit;text-decoration:none;"><img src="/decodie.png" alt="Decodie" style="height:28px;width:28px;"> Decodie</a></h1>
  </div>
  <div class="view-switcher" id="viewSwitcher">
    <button class="view-tab active" data-mode="lessons">Lessons</button>
    <button class="view-tab" data-mode="entries">Entries</button>
  </div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span class="project-name" id="projectName"></span>
    <a href="#/settings" class="settings-link" id="settingsLink">Settings</a>
  </div>
</header>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app-layout">
  <!-- Sidebar / Filter Panel -->
  <aside class="sidebar" id="sidebar">
    <h3>Search</h3>
    <input type="text" class="search-input" id="searchInput" placeholder="Search entries...">

    <h3>Lifecycle</h3>
    <div class="lifecycle-tabs" id="lifecycleTabs">
      <button class="lifecycle-tab active" data-value="active">Active</button>
      <button class="lifecycle-tab" data-value="archived">Archived</button>
      <button class="lifecycle-tab" data-value="">All</button>
    </div>

    <h3>Experience Level</h3>
    <div class="filter-group" id="levelFilters">
      <label><input type="checkbox" value="foundational"> Foundational</label>
      <label><input type="checkbox" value="intermediate"> Intermediate</label>
      <label><input type="checkbox" value="advanced"> Advanced</label>
      <label><input type="checkbox" value="ecosystem"> Ecosystem</label>
    </div>

    <h3>Decision Type</h3>
    <div class="filter-group" id="typeFilters">
      <label><input type="checkbox" value="explanation"> Explanation</label>
      <label><input type="checkbox" value="rationale"> Rationale</label>
      <label><input type="checkbox" value="pattern"> Pattern</label>
      <label><input type="checkbox" value="warning"> Warning</label>
      <label><input type="checkbox" value="convention"> Convention</label>
    </div>

    <h3>Topics</h3>
    <div class="topic-chips" id="topicChips"></div>

    <h3>Session</h3>
    <select class="session-select" id="sessionFilter">
      <option value="">All sessions</option>
    </select>

    <button class="filter-reset" id="resetFilters">Reset all filters</button>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Dynamically rendered -->
  </main>
</div>

<!-- Q&A Panel -->
<div class="qa-backdrop" id="qaBackdrop"></div>
<div class="qa-panel" id="qaPanel">
  <div class="qa-panel-header">
    <h3>Ask about this</h3>
    <button class="qa-clear-btn" id="qaClear" title="Clear conversation">Clear</button>
    <button class="qa-close" id="qaClose" aria-label="Close Q&A panel">&times;</button>
  </div>
  <div class="qa-panel-body">
    <div>
      <div class="qa-context-label">Selected context</div>
      <div class="qa-context" id="qaContext"></div>
    </div>
    <div class="qa-messages" id="qaMessages"></div>
    <div class="qa-input-row">
      <textarea class="qa-input" id="qaInput" placeholder="Ask a question..." rows="1"></textarea>
      <button class="qa-send" id="qaSend">Send</button>
    </div>
  </div>
</div>

<!-- Confirmation dialog (hidden by default) -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 id="confirmTitle">Confirm</h3>
    <p id="confirmMessage">Are you sure?</p>
    <div class="dialog-actions">
      <button class="btn-outline btn-sm" id="confirmCancel">Cancel</button>
      <button class="btn-danger btn-sm" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
(function () {
  'use strict';

  // ---- State ----
  const state = {
    entries: [],
    allTopics: [],
    projectName: '',
    filters: {
      search: '',
      lifecycle: 'active',
      levels: [],
      types: [],
      topics: [],
      session: '',
    },
    allSessions: [],
    loading: false,
    error: null,
    currentView: 'list',   // 'list' or 'detail'
    detailEntry: null,
    detailLoading: false,
    detailError: null,
    qaEnabled: false,
    qaConversation: [],    // Array of {role, content}
    qaSelectedText: '',
    qaStreaming: false,
    conversationEntryIds: [],
    qaConversationCreatedAt: null,
    learnedEntries: {},
    currentMode: 'entries',
    lessons: [],
    lessonDetail: null,
    lessonDetailLoading: false,
    lessonDetailError: null,
    lessonContext: null,  // { lessonId, lessonTitle, entries: [{ entry_id, order }], currentIndex }
  };

  // ---- DOM refs ----
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const mainEl = $('#mainContent');
  const searchInput = $('#searchInput');
  const lifecycleTabs = $$('#lifecycleTabs .lifecycle-tab');
  const topicChipsEl = $('#topicChips');
  const projectNameEl = $('#projectName');
  const sidebarToggle = $('#sidebarToggle');
  const sidebar = $('#sidebar');
  const sidebarOriginalHTML = sidebar.innerHTML;
  const backdrop = $('#sidebarBackdrop');
  const confirmOverlay = $('#confirmOverlay');

  // ---- Utilities ----
  function debounce(fn, ms) {
    let t;
    return function (...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function worstRefStatus(resolutions) {
    if (!resolutions || resolutions.length === 0) return null;
    const order = ['stale', 'fuzzy', 'drifted', 'resolved'];
    let worst = 'resolved';
    for (const r of resolutions) {
      if (order.indexOf(r.status) < order.indexOf(worst)) {
        worst = r.status;
      }
    }
    return worst;
  }

  function detectLanguage(code) {
    if (!code) return 'plaintext';
    // Simple heuristic
    if (code.includes('import ') && (code.includes(' from ') || code.includes('require('))) return 'typescript';
    if (code.includes('def ') || code.includes('import ') && code.includes(':')) return 'python';
    if (code.includes('func ') && code.includes(':=')) return 'go';
    if (code.includes('fn ') && code.includes('->')) return 'rust';
    if (code.includes('function ') || code.includes('=>') || code.includes('const ') || code.includes('let ')) return 'javascript';
    if (code.includes('<') && code.includes('/>')) return 'jsx';
    if (code.match(/^\s*\{/)) return 'json';
    return 'javascript';
  }

  // ---- API ----
  async function fetchEntries() {
    state.loading = true;
    state.error = null;
    render();
    try {
      const params = new URLSearchParams();
      if (state.filters.lifecycle) params.set('lifecycle', state.filters.lifecycle);
      if (state.filters.search) params.set('search', state.filters.search);
      // Note: API supports single level/topic/type, so we fetch all and filter client-side for multi-select
      const resp = await fetch('/api/entries?' + params.toString());
      if (!resp.ok) throw new Error('Failed to load entries');
      const data = await resp.json();
      state.projectName = data.project || '';
      projectNameEl.textContent = state.projectName ? 'Current Project: ' + state.projectName : '';

      state.entries = data.entries || [];
      // Build unique topic list from all entries (not just filtered)
      rebuildTopics(data.entries || []);
    } catch (e) {
      state.error = e.message;
    }
    state.loading = false;
    render();
  }

  async function fetchAllTopics() {
    // Fetch all entries once to get full topic list
    try {
      const resp = await fetch('/api/entries');
      if (!resp.ok) return;
      const data = await resp.json();
      rebuildTopics(data.entries || []);
      if (data.project) {
        state.projectName = data.project;
        projectNameEl.textContent = data.project ? 'Current Project: ' + data.project : '';
      }
    } catch (_) {
      // ignore
    }
  }

  function rebuildTopics(entries) {
    const set = new Set();
    for (const e of entries) {
      if (e.topics) e.topics.forEach((t) => set.add(t));
    }
    state.allTopics = Array.from(set).sort();
    renderTopicChips();

    // Build sessions list
    var sessionMap = {};
    for (var i = 0; i < entries.length; i++) {
      var sid = entries[i].session_id;
      if (sid && !sessionMap[sid]) {
        sessionMap[sid] = { id: sid, count: 0 };
      }
      if (sid) sessionMap[sid].count++;
    }
    state.allSessions = Object.values(sessionMap).sort(function(a, b) {
      return b.id.localeCompare(a.id);
    });
    renderSessionFilter();
  }

  function formatSessionLabel(sessionId) {
    // Session IDs are YYYY-MM-DD-NNN
    var parts = sessionId.match(/^(\d{4})-(\d{2})-(\d{2})-(\d+)$/);
    if (!parts) return sessionId;
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var month = months[parseInt(parts[2], 10) - 1] || parts[2];
    var day = parseInt(parts[3], 10);
    var seq = parseInt(parts[4], 10);
    return month + ' ' + day + ', ' + parts[1] + ' (#' + seq + ')';
  }

  function renderSessionFilter() {
    var select = $('#sessionFilter');
    if (!select) return;
    var html = '<option value="">All sessions</option>';
    for (var i = 0; i < state.allSessions.length; i++) {
      var s = state.allSessions[i];
      var label = formatSessionLabel(s.id) + ' (' + s.count + ')';
      var selected = state.filters.session === s.id ? ' selected' : '';
      html += '<option value="' + escapeHtml(s.id) + '"' + selected + '>' + escapeHtml(label) + '</option>';
    }
    select.innerHTML = html;
  }

  async function fetchDetail(id) {
    state.detailLoading = true;
    state.detailError = null;
    state.detailEntry = null;
    state.currentView = 'detail';
    render();
    try {
      const resp = await fetch('/api/entries/' + encodeURIComponent(id));
      if (!resp.ok) throw new Error('Entry not found');
      state.detailEntry = await resp.json();
    } catch (e) {
      state.detailError = e.message;
    }
    state.detailLoading = false;
    render();
  }

  async function patchEntry(id, body) {
    const resp = await fetch('/api/entries/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      throw new Error(data.error || 'Update failed');
    }
    return resp.json();
  }

  // ---- Confirm dialog ----
  function showConfirm(title, message) {
    return new Promise((resolve) => {
      $('#confirmTitle').textContent = title;
      $('#confirmMessage').textContent = message;
      confirmOverlay.classList.remove('hidden');

      function cleanup(result) {
        confirmOverlay.classList.add('hidden');
        $('#confirmOk').removeEventListener('click', onOk);
        $('#confirmCancel').removeEventListener('click', onCancel);
        resolve(result);
      }
      function onOk() { cleanup(true); }
      function onCancel() { cleanup(false); }

      $('#confirmOk').addEventListener('click', onOk);
      $('#confirmCancel').addEventListener('click', onCancel);
    });
  }

  // ---- Filtering (client-side multi-select) ----
  function filteredEntries() {
    let list = state.entries;
    const f = state.filters;

    if (f.levels.length > 0) {
      list = list.filter((e) => f.levels.includes(e.experience_level));
    }
    if (f.types.length > 0) {
      list = list.filter((e) => f.types.includes(e.decision_type));
    }
    if (f.topics.length > 0) {
      list = list.filter((e) => e.topics && f.topics.some((t) => e.topics.includes(t)));
    }
    if (f.session) {
      list = list.filter((e) => e.session_id === f.session);
    }

    // Sort: pinned first, then by timestamp descending
    list.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return (b.timestamp || '').localeCompare(a.timestamp || '');
    });

    return list;
  }

  // ---- Rendering ----
  function render() {
    if (state.currentView === 'detail') {
      renderDetail();
    } else {
      renderList();
    }
  }

  function renderList() {
    if (state.loading) {
      mainEl.innerHTML = '<div class="state-message"><div class="spinner"></div><div>Loading entries...</div></div>';
      return;
    }
    if (state.error) {
      mainEl.innerHTML = '<div class="error-banner">' + escapeHtml(state.error) + '</div>';
      return;
    }

    const entries = filteredEntries();
    let html = '<div class="entry-list-header"><h2>Learning Entries</h2><span class="entry-count">' + entries.length + ' entries</span></div>';

    if (entries.length === 0) {
      html += '<div class="state-message">No entries match the current filters.</div>';
      mainEl.innerHTML = html;
      return;
    }

    html += '<div class="entry-list">';
    for (const e of entries) {
      const worst = worstRefStatus(e.reference_resolutions);
      const pinIcon = e.pinned ? '<span class="pin-icon" title="Pinned">&#128204;</span>' : '';

      html += '<div class="entry-card' + (e.pinned ? ' pinned' : '') + '" data-id="' + escapeHtml(e.id) + '">';
      html += '<div class="entry-card-header">';
      html += pinIcon;
      html += '<span class="entry-card-title">' + escapeHtml(e.title) + '</span>';
      if (state.conversationEntryIds.includes(e.id)) {
        html += '<span class="conversation-indicator" title="Has Q&amp;A conversation">&#128172;</span>';
      }
      if (state.learnedEntries[e.id]) {
        html += '<span class="learned-badge">&#10003; Learned</span>';
      }
      html += '<div class="entry-card-ref-dots">';
      if (worst) {
        html += '<span class="ref-dot ref-dot-' + worst + '" title="Reference: ' + worst + '"></span>';
      }
      html += '</div>';
      html += '</div>';

      html += '<div class="entry-card-meta">';
      html += '<span class="badge badge-' + e.experience_level + '">' + e.experience_level + '</span>';
      html += '<span class="badge badge-type">' + e.decision_type + '</span>';
      html += '<span class="entry-card-timestamp">' + formatDate(e.timestamp) + '</span>';
      html += '</div>';

      if (e.topics && e.topics.length > 0) {
        html += '<div class="entry-card-topics">';
        for (const t of e.topics) {
          html += '<span class="tag">' + escapeHtml(t) + '</span>';
        }
        html += '</div>';
      }

      html += '</div>';
    }
    html += '</div>';

    mainEl.innerHTML = html;

    // Attach click handlers
    mainEl.querySelectorAll('.entry-card').forEach((card) => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        window.location.hash = '#/entry/' + encodeURIComponent(id);
      });
    });
  }

  function renderDetail() {
    if (state.detailLoading) {
      mainEl.innerHTML = '<div class="detail-view"><button class="back-btn" id="backBtn">&larr; Back</button><div class="state-message"><div class="spinner"></div><div>Loading entry...</div></div></div>';
      attachBackBtn();
      return;
    }
    if (state.detailError) {
      mainEl.innerHTML = '<div class="detail-view"><button class="back-btn" id="backBtn">&larr; Back</button><div class="error-banner">' + escapeHtml(state.detailError) + '</div></div>';
      attachBackBtn();
      return;
    }

    const e = state.detailEntry;
    if (!e) return;

    let html = '<div class="detail-view">';
    html += '<button class="back-btn" id="backBtn">&larr; ' + (state.lessonContext ? 'Back to lesson' : 'Back to list') + '</button>';

    if (state.lessonContext) {
      var ctx = state.lessonContext;
      var pos = ctx.currentIndex + 1;
      var total = ctx.entries.length;

      html += '<div class="lesson-nav-bar">';
      html += '<button class="lesson-nav-btn" id="lessonPrevBtn"' + (pos === 1 ? ' disabled' : '') + '>&larr; Previous</button>';
      html += '<span class="lesson-nav-position">Entry ' + pos + ' of ' + total + ' in <strong>' + escapeHtml(ctx.lessonTitle) + '</strong></span>';
      html += '<button class="lesson-nav-btn" id="lessonNextBtn"' + (pos === total ? ' disabled' : '') + '>Next &rarr;</button>';
      html += '</div>';
    }

    // Header
    html += '<div class="detail-header">';
    html += '<h2 class="detail-title">' + escapeHtml(e.title) + '</h2>';
    html += '<div class="detail-meta">';
    html += '<span class="badge badge-' + e.experience_level + '">' + e.experience_level + '</span>';
    html += '<span class="badge badge-type">' + e.decision_type + '</span>';
    if (e.topics) {
      for (const t of e.topics) {
        html += '<span class="tag">' + escapeHtml(t) + '</span>';
      }
    }
    html += '<span class="timestamp">' + formatDate(e.timestamp) + '</span>';
    if (e.lifecycle === 'archived') {
      html += '<span class="badge" style="background:#5e7d96">archived</span>';
    }
    if (e.pinned) {
      html += '<span class="badge" style="background:var(--primary)">pinned</span>';
    }
    html += '</div>';
    html += '</div>';

    // Code snippet
    if (e.code_snippet) {
      const lang = detectLanguage(e.code_snippet);
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Code Snippet';
      if (state.qaEnabled) {
        html += '<button class="qa-section-ask" data-section="code">Ask</button>';
      }
      html += '</div>';
      html += '<div class="code-block"><pre><code class="language-' + lang + '">' + escapeHtml(e.code_snippet) + '</code></pre></div>';
      html += '</div>';
    }

    // Explanation
    if (e.explanation) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Explanation';
      if (state.qaEnabled) {
        html += '<button class="qa-section-ask" data-section="explanation">Ask</button>';
      }
      html += '</div>';
      html += '<div class="detail-explanation">' + escapeHtml(e.explanation) + '</div>';
      html += '</div>';
    }

    // Breakdowns
    if (e.breakdowns && e.breakdowns.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Breakdown</div>';
      for (var bi = 0; bi < e.breakdowns.length; bi++) {
        var bd = e.breakdowns[bi];
        var bdLang = detectLanguage(bd.code_excerpt || '');
        html += '<details class="collapsible-section breakdown-item"' + (bi === 0 ? ' open' : '') + '>';
        html += '<summary>';
        html += '<span class="breakdown-summary-label">Step ' + (bi + 1) + '</span>';
        if (bd.pattern) {
          html += '<span class="breakdown-pattern-badge">' + escapeHtml(bd.pattern) + '</span>';
        }
        html += '</summary>';
        html += '<div class="collapsible-body breakdown-body">';
        if (bd.code_excerpt) {
          html += '<div class="code-block"><pre><code class="language-' + bdLang + '">' + escapeHtml(bd.code_excerpt) + '</code></pre></div>';
        }
        if (bd.explanation) {
          html += '<div class="breakdown-explanation">' + escapeHtml(bd.explanation) + '</div>';
        }
        html += '</div>';
        html += '</details>';
      }
      html += '</div>';
    }

    // Alternatives considered (collapsible)
    if (e.alternatives_considered) {
      html += '<div class="detail-section">';
      html += '<details class="collapsible-section">';
      html += '<summary>Alternatives Considered';
      if (state.qaEnabled) {
        html += '<button class="qa-section-ask" data-section="alternatives" style="margin-left:auto;">Ask</button>';
      }
      html += '</summary>';
      html += '<div class="collapsible-body">' + escapeHtml(e.alternatives_considered) + '</div>';
      html += '</details>';
      html += '</div>';
    }

    // Issues
    if (e.issues && e.issues.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Issues</div>';
      html += '<ul class="issue-list">';
      for (var ii = 0; ii < e.issues.length; ii++) {
        var iss = e.issues[ii];
        var sev = iss.severity || 'info';
        html += '<li class="issue-item">';
        html += '<div class="issue-header">';
        html += '<span class="severity-badge severity-' + escapeHtml(sev) + '">' + escapeHtml(sev) + '</span>';
        html += '</div>';
        if (iss.description) {
          html += '<div class="issue-description">' + escapeHtml(iss.description) + '</div>';
        }
        if (iss.suggestion) {
          html += '<div class="issue-suggestion"><strong>Suggestion:</strong> ' + escapeHtml(iss.suggestion) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';
      html += '</div>';
    }

    // Improvements
    if (e.improvements && e.improvements.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Improvements</div>';
      html += '<ul class="improvement-list">';
      for (var mi = 0; mi < e.improvements.length; mi++) {
        var imp = e.improvements[mi];
        html += '<li class="improvement-item">';
        if (imp.description) {
          html += '<div class="improvement-description">' + escapeHtml(imp.description) + '</div>';
        }
        if (imp.rationale) {
          html += '<div class="improvement-rationale">' + escapeHtml(imp.rationale) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';
      html += '</div>';
    }

    // Key concepts
    if (e.key_concepts && e.key_concepts.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Key Concepts';
      if (state.qaEnabled) {
        html += '<button class="qa-section-ask" data-section="concepts">Ask</button>';
      }
      html += '</div>';
      html += '<ul class="concepts-list">';
      for (const c of e.key_concepts) {
        html += '<li>' + escapeHtml(c) + '</li>';
      }
      html += '</ul>';
      html += '</div>';
    }

    // External docs
    if (e.external_docs && e.external_docs.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Documentation</div>';
      html += '<div class="doc-links">';
      for (const d of e.external_docs) {
        html += '<a class="doc-link" href="' + escapeHtml(d.url) + '" target="_blank" rel="noopener">&#128196; ' + escapeHtml(d.label) + '</a>';
      }
      html += '</div>';
      html += '</div>';
    }

    // Reference resolutions
    if (e.reference_resolutions && e.reference_resolutions.length > 0) {
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">Code References</div>';
      html += '<div class="ref-list">';

  function attachDetailActions(entry) {
    const learnedBtn = $('#learnedBtn');
    if (learnedBtn) {
      learnedBtn.addEventListener('click', async () => {
        const isLearned = !!state.learnedEntries[entry.id];
        const method = isLearned ? 'DELETE' : 'POST';
        try {
          await fetch('/api/progress/' + encodeURIComponent(entry.id) + '/learn', { method: method });
          if (isLearned) {
            delete state.learnedEntries[entry.id];
          } else {
            state.learnedEntries[entry.id] = { learned_at: new Date().toISOString() };
          }
          // Update cached lessonDetail if in lesson context
          if (state.lessonContext && state.lessonDetail && state.lessonDetail.entries) {
            var newLearned = !isLearned;
            for (var li = 0; li < state.lessonDetail.entries.length; li++) {
              if (state.lessonDetail.entries[li].entry && state.lessonDetail.entries[li].entry.id === entry.id) {
                state.lessonDetail.entries[li].learned = newLearned;
                break;
              }
            }
            // Recompute learned_count
            var count = 0;
            for (var lj = 0; lj < state.lessonDetail.entries.length; lj++) {
              if (state.lessonDetail.entries[lj].learned) count++;
            }
            state.lessonDetail.learned_count = count;
          }
          renderDetail();
        } catch (err) {
          alert('Error: ' + err.message);
        }
      });
    }

    const archiveBtn = $('#archiveBtn');
    if (archiveBtn) {
      archiveBtn.addEventListener('click', async () => {
        const ok = await showConfirm(
          'Archive Entry',

        try {
          archiveBtn.disabled = true;
          archiveBtn.textContent = 'Archiving...';
          await patchEntry(entry.id, { lifecycle: 'archived' });

          await fetchDetail(entry.id);

          alert('Error: ' + e.message);
          archiveBtn.disabled = false;
          archiveBtn.textContent = 'Archive';

    // Q&A section "Ask" buttons

        });

    const pinBtn = $('#pinBtn');

      pinBtn.addEventListener('click', async () => {
        try {
          pinBtn.disabled = true;
          const newPinned = !entry.pinned;
          pinBtn.textContent = newPinned ? 'Pinning...' : 'Unpinning...';
          await patchEntry(entry.id, { pinned: newPinned });

        } catch (e) {
          alert('Error: ' + e.message);
          pinBtn.disabled = false;
          pinBtn.textContent = entry.pinned ? 'Unpin' : 'Pin';

    const sel = window.getSelection();
    const text = sel ? sel.toString().trim() : '';

    // Get position near selection

    const rect = range.getBoundingClientRect();
    const x = rect.left + rect.width / 2 - 55 + window.scrollX;
    const y = rect.top - 36 + window.scrollY;

    showQATooltip(x, y, text);

  // Basic markdown rendering
  function renderMarkdown(text) {
    // Escape HTML
    let html = escapeHtml(text);
    // Code blocks: ```...```
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function (_, lang, code) {
      return '<pre><code>' + code + '</code></pre>';
    });
    // Inline code: `...`
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold: **...**
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Italic: *...*
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

    }
    qaMessages.appendChild(div);
    qaMessages.scrollTop = qaMessages.scrollHeight;
    return div;
  }

  function updateQAMessage(el, content, streaming) {

  async function sendQAQuestion() {
    const question = qaInput.value.trim();
    if (!question || state.qaStreaming || !state.detailEntry) return;

    state.qaStreaming = true;
    qaSend.disabled = true;
    qaInput.value = '';

    // Show user message
    appendQAMessage('user', question, false);

    // Create assistant message element for streaming
    const assistantEl = appendQAMessage('assistant', '', true);
    let fullText = '';

    try {
      const body = {
        entry_id: state.detailEntry.id,
        selected_text: state.qaSelectedText,
        question: question,
        conversation: state.qaConversation.length > 0 ? state.qaConversation : undefined,
      };

      const resp = await fetch('/api/qa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(function () { return {}; });
        throw new Error(errData.error || 'Request failed');
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') continue;

          try {
            const data = JSON.parse(payload);
            if (data.type === 'delta' && data.text) {
              fullText += data.text;
              updateQAMessage(assistantEl, fullText, true);
            } else if (data.type === 'error') {
              fullText += '\n\n[Error: ' + data.error + ']';
              updateQAMessage(assistantEl, fullText, false);
            }
          } catch (_) {
            // ignore parse errors on partial data
          }
        }
      }
    } catch (err) {
      fullText = fullText || '[Error: ' + err.message + ']';
    }

    updateQAMessage(assistantEl, fullText, false);

    // Add to conversation history for follow-ups
    state.qaConversation.push({ role: 'user', content: question });
    state.qaConversation.push({ role: 'assistant', content: fullText });

    // Auto-save conversation
    var saveData = {
      entry_id: state.detailEntry.id,
      selected_text: state.qaSelectedText,
      messages: state.qaConversation,
      created_at: state.qaConversationCreatedAt || new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    if (!state.qaConversationCreatedAt) {
      state.qaConversationCreatedAt = saveData.created_at;
    }
    fetch('/api/conversations/' + encodeURIComponent(state.detailEntry.id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(saveData)
    }).then(function () {
      // Update the conversation list so indicators appear
      if (!state.conversationEntryIds.includes(state.detailEntry.id)) {
        state.conversationEntryIds.push(state.detailEntry.id);
      }
    });

    state.qaStreaming = false;
    qaSend.disabled = false;
    qaInput.focus();
  }

  async function renderLessonDetail(lessonId) {
    state.currentView = 'lessonDetail';
    state.currentMode = 'lessons';
    state.lessonDetailLoading = true;
    state.lessonDetailError = null;
    state.lessonDetail = null;
    document.querySelector('.app-layout').classList.add('lessons-mode');
    updateViewSwitcher('lessons');

    mainEl.innerHTML = '<div class="lesson-detail"><button class="back-btn" id="backToLessons">&larr; Back to lessons</button><div class="state-message"><div class="spinner"></div><div>Loading lesson...</div></div></div>';
    attachLessonBackBtn();

    try {
      var results = await Promise.all([
        fetch('/api/lessons/' + encodeURIComponent(lessonId)),
        fetchLessons()
      ]);
      var resp = results[0];
      if (!resp.ok) throw new Error('Lesson not found');
      state.lessonDetail = await resp.json();
    } catch (e) {
      state.lessonDetailError = e.message;
    }
    state.lessonDetailLoading = false;

    if (state.lessonDetailError) {
      mainEl.innerHTML = '<div class="lesson-detail"><button class="back-btn" id="backToLessons">&larr; Back to lessons</button><div class="error-banner">' + escapeHtml(state.lessonDetailError) + '</div></div>';
      attachLessonBackBtn();
      return;
    }

    var lesson = state.lessonDetail;
    if (!lesson) return;

    var pct = lesson.total_count > 0 ? Math.round((lesson.learned_count / lesson.total_count) * 100) : 0;
    var typeBadgeClass = lesson.type === 'custom' ? 'lesson-type-badge-custom' : 'lesson-type-badge-auto';

    var html = '<div class="lesson-detail">';
    html += '<button class="back-btn" id="backToLessons">&larr; Back to lessons</button>';

    html += '<div class="lesson-detail-header">';
    html += '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">';
    html += '<h2 class="lesson-detail-title" style="margin-bottom:0">' + escapeHtml(lesson.title) + '</h2>';
    html += '<span class="lesson-type-badge ' + typeBadgeClass + '">' + escapeHtml(lesson.type) + '</span>';
    html += '</div>';

    if (lesson.description) {
      html += '<div class="lesson-detail-desc">' + escapeHtml(lesson.description) + '</div>';
    }

    html += '<div class="lesson-detail-progress">';
    html += '<div class="lesson-progress" style="flex:1"><div class="lesson-progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<span class="lesson-progress-text">' + lesson.learned_count + ' / ' + lesson.total_count + ' (' + pct + '%)</span>';
    html += '</div>';
    html += '</div>';

    // Action buttons
    html += '<div class="lesson-detail-actions">';

    // Start/Continue button
    var firstUnlearned = null;
    if (lesson.entries) {
      for (var i = 0; i < lesson.entries.length; i++) {
        if (!lesson.entries[i].learned && !lesson.entries[i].missing) {
          firstUnlearned = lesson.entries[i];
          break;
        }
      }
    }
    if (firstUnlearned) {
      var btnLabel = lesson.learned_count > 0 ? 'Continue' : 'Start';
      html += '<button class="btn-primary btn-sm" id="lessonStartBtn" data-entry-id="' + escapeHtml(firstUnlearned.entry.id) + '">' + btnLabel + '</button>';
    }

    if (lesson.type === 'custom') {
      html += '<button class="btn-outline btn-sm" id="lessonEditBtn">Edit</button>';
      html += '<button class="btn-danger btn-sm" id="lessonDeleteBtn">Delete</button>';
    }
    html += '</div>';

    // Entry list
    html += '<div class="lesson-entry-list">';
    if (lesson.entries) {
      for (var j = 0; j < lesson.entries.length; j++) {
        var item = lesson.entries[j];
        var entryData = item.entry || {};
        var isMissing = !!item.missing;
        var itemClass = 'lesson-entry-item' + (isMissing ? ' lesson-entry-missing' : '');

        html += '<div>';
        html += '<div class="' + itemClass + '" data-entry-id="' + escapeHtml(entryData.id || '') + '">';
        html += '<span class="lesson-entry-order">' + (item.order != null ? item.order : (j + 1)) + '</span>';
        html += '<span class="lesson-entry-title">' + escapeHtml(entryData.title || entryData.id || 'Unknown entry') + '</span>';
        if (entryData.experience_level) {
          html += '<span class="badge badge-' + entryData.experience_level + '">' + entryData.experience_level + '</span>';
        }
        if (item.learned) {
          html += '<span class="lesson-entry-learned">&#10003;</span>';
        } else {
          html += '<span class="lesson-entry-learned-spacer"></span>';
        }
        html += '</div>';
        if (item.note) {
          html += '<div class="lesson-entry-note">' + escapeHtml(item.note) + '</div>';
        }
        html += '</div>';
      }
    }
    html += '</div>';

    html += '</div>'; // .lesson-detail

    mainEl.innerHTML = html;
    attachLessonBackBtn();

    // Render lesson outline in sidebar
    renderLessonSidebar(lesson, null);

    // Attach start/continue button
    var startBtn = document.getElementById('lessonStartBtn');
    if (startBtn) {
      startBtn.addEventListener('click', function() {
        var entryId = startBtn.getAttribute('data-entry-id');
        window.location.hash = '#/lessons/' + encodeURIComponent(lessonId) + '/entries/' + encodeURIComponent(entryId);
      });
    }

    // Attach entry click handlers
    mainEl.querySelectorAll('.lesson-entry-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var entryId = el.getAttribute('data-entry-id');
        if (entryId) {
          window.location.hash = '#/lessons/' + encodeURIComponent(lessonId) + '/entries/' + encodeURIComponent(entryId);
        }
      });
    });

    // Edit button
    var editBtn = document.getElementById('lessonEditBtn');
    if (editBtn) {
      editBtn.addEventListener('click', function() {
        openLessonModal(lesson);
      });
    }

    // Delete button
    var deleteBtn = document.getElementById('lessonDeleteBtn');
    if (deleteBtn) {
      deleteBtn.addEventListener('click', async function() {
        var ok = await showConfirm('Delete Lesson', 'Delete "' + lesson.title + '"? This cannot be undone.');
        if (!ok) return;
        try {
          var resp = await fetch('/api/lessons/' + encodeURIComponent(lesson.id), { method: 'DELETE' });
          if (!resp.ok) throw new Error('Delete failed');
          window.location.hash = '#/lessons';
        } catch (err) {
          alert('Error: ' + err.message);
        }
      });
    }
  }

  function attachLessonBackBtn() {
    var btn = document.getElementById('backToLessons');
    if (btn) {
      btn.addEventListener('click', function() {
        window.location.hash = '#/lessons';
      });
    }
  }

  function restoreFilterSidebar() {
    if (!sidebar.classList.contains('lesson-sidebar')) return;
    sidebar.innerHTML = sidebarOriginalHTML;
    sidebar.classList.remove('lesson-sidebar');
    // Re-attach session filter listener (lost when innerHTML was replaced)
    var sessionSelect = $('#sessionFilter');
    if (sessionSelect) {
      sessionSelect.addEventListener('change', function() {
        state.filters.session = this.value;
        render();
      });
      renderSessionFilter();
    }
  }

  function renderLessonSidebar(lessonDetail, activeEntryId) {
    if (!lessonDetail) return;

    var html = '';

    // Lesson title
    html += '<h3 class="lesson-sidebar-title">' + escapeHtml(lessonDetail.title) + '</h3>';

    // Progress
    var pct = lessonDetail.total_count > 0 ? Math.round((lessonDetail.learned_count / lessonDetail.total_count) * 100) : 0;
    html += '<div class="lesson-sidebar-progress">';
    html += '<div class="lesson-progress"><div class="lesson-progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<span class="lesson-sidebar-progress-text">' + lessonDetail.learned_count + ' / ' + lessonDetail.total_count + ' learned</span>';
    html += '</div>';

    // Entry outline
    html += '<div class="lesson-sidebar-entries">';
    if (lessonDetail.entries) {
      for (var i = 0; i < lessonDetail.entries.length; i++) {
        var item = lessonDetail.entries[i];
        var entry = item.entry || {};
        var isActive = entry.id === activeEntryId;
        var isMissing = !!item.missing;
        var cls = 'lesson-sidebar-entry';
        if (isActive) cls += ' is-active';
        if (isMissing) cls += ' is-missing';
        if (item.learned) cls += ' is-learned';

        html += '<a class="' + cls + '" href="#/lessons/' + encodeURIComponent(lessonDetail.id) + '/entries/' + encodeURIComponent(entry.id) + '">';
        html += '<span class="lesson-sidebar-entry-num">' + (i + 1) + '</span>';
        html += '<span class="lesson-sidebar-entry-title">' + escapeHtml(entry.title || 'Unknown') + '</span>';
        if (item.learned) {
          html += '<span class="lesson-sidebar-entry-check">&#10003;</span>';
        }
        html += '</a>';
      }
    }
    html += '</div>';

    // Prev/Next lesson links
    if (state.lessons && state.lessons.length > 1) {
      var currentIdx = -1;
      for (var j = 0; j < state.lessons.length; j++) {
        if (state.lessons[j].id === lessonDetail.id) {
          currentIdx = j;
          break;
        }
      }

      if (currentIdx >= 0) {
        html += '<div class="lesson-sidebar-nav">';
        if (currentIdx > 0) {
          var prevLesson = state.lessons[currentIdx - 1];
          html += '<a class="lesson-sidebar-nav-link" href="#/lessons/' + encodeURIComponent(prevLesson.id) + '">&larr; ' + escapeHtml(prevLesson.title) + '</a>';
        }
        if (currentIdx < state.lessons.length - 1) {
          var nextLesson = state.lessons[currentIdx + 1];
          html += '<a class="lesson-sidebar-nav-link lesson-sidebar-nav-next" href="#/lessons/' + encodeURIComponent(nextLesson.id) + '">' + escapeHtml(nextLesson.title) + ' &rarr;</a>';
        }
        html += '</div>';
      }
    }

    sidebar.innerHTML = html;
    sidebar.classList.add('lesson-sidebar');
  }

  // ---- Lesson Create/Edit Modal ----

  function openLessonModal(existingLesson) {
    var isEdit = !!existingLesson;
    var selectedEntries = []; // { id, title, order, note }

    if (isEdit && existingLesson.entries) {
      selectedEntries = existingLesson.entries.map(function(item, idx) {
        return {
          id: item.entry ? item.entry.id : '',
          title: item.entry ? (item.entry.title || item.entry.id) : 'Unknown',
          order: item.order != null ? item.order : (idx + 1),
          note: item.note || ''
        };
      });
    }

    var overlay = document.createElement('div');
    overlay.className = 'lesson-modal-overlay';

    var modal = document.createElement('div');
    modal.className = 'lesson-modal';

    modal.innerHTML = '<h3>' + (isEdit ? 'Edit Lesson' : 'Create Lesson') + '</h3>'
      + '<div class="lesson-modal-field">'
      + '<label for="lessonTitleInput">Title *</label>'
      + '<input type="text" id="lessonTitleInput" placeholder="Lesson title" value="' + escapeHtml(isEdit ? existingLesson.title : '') + '">'
      + '</div>'
      + '<div class="lesson-modal-field">'
      + '<label for="lessonDescInput">Description</label>'
      + '<textarea id="lessonDescInput" placeholder="Optional description" rows="2">' + escapeHtml(isEdit ? (existingLesson.description || '') : '') + '</textarea>'
      + '</div>'
      + '<div class="lesson-modal-field">'
      + '<label>Entries</label>'
      + '<div class="entry-picker" id="entryPickerContainer">'
      + '<input type="text" class="entry-picker-search" id="entryPickerSearch" placeholder="Search entries...">'
      + '<div id="entryPickerList"></div>'
      + '</div>'
      + '</div>'
      + '<div class="lesson-modal-field">'
      + '<label>Selected entries (drag to reorder)</label>'
      + '<div class="entry-order-list" id="entryOrderList"></div>'
      + '</div>'
      + '<div class="lesson-modal-actions">'
      + '<button class="btn-outline btn-sm" id="lessonModalCancel">Cancel</button>'
      + '<button class="btn-primary btn-sm" id="lessonModalSave">' + (isEdit ? 'Save' : 'Create') + '</button>'
      + '</div>';

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    var allPickerEntries = [];

    // Load entries for picker
    fetch('/api/entries?lifecycle=active')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allPickerEntries = data.entries || [];
        renderPickerEntries('');
      });

    function renderPickerEntries(searchTerm) {
      var container = document.getElementById('entryPickerList');
      if (!container) return;
      var filtered = allPickerEntries;
      if (searchTerm) {
        var term = searchTerm.toLowerCase();
        filtered = allPickerEntries.filter(function(e) {
          return (e.title || '').toLowerCase().indexOf(term) >= 0 || (e.id || '').toLowerCase().indexOf(term) >= 0;
        });
      }
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var e = filtered[i];
        var checked = selectedEntries.some(function(s) { return s.id === e.id; }) ? ' checked' : '';
        html += '<label class="entry-picker-item">';
        html += '<input type="checkbox" value="' + escapeHtml(e.id) + '"' + checked + '>';
        html += '<span>' + escapeHtml(e.title) + '</span>';
        html += '</label>';
      }
      if (filtered.length === 0) {
        html = '<div style="padding:0.5rem 0.75rem;color:var(--text-light);font-size:0.8125rem;">No entries found</div>';
      }
      container.innerHTML = html;

      // Attach checkbox handlers
      container.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', function() {
          var entryId = cb.value;
          if (cb.checked) {
            var entry = allPickerEntries.find(function(e) { return e.id === entryId; });
            if (entry && !selectedEntries.some(function(s) { return s.id === entryId; })) {
              selectedEntries.push({
                id: entry.id,
                title: entry.title || entry.id,
                order: selectedEntries.length + 1,
                note: ''
              });
            }
          } else {
            selectedEntries = selectedEntries.filter(function(s) { return s.id !== entryId; });
            // Re-number
            selectedEntries.forEach(function(s, idx) { s.order = idx + 1; });
          }
          renderOrderList();
        });
      });
    }

    function renderOrderList() {
      var container = document.getElementById('entryOrderList');
      if (!container) return;
      if (selectedEntries.length === 0) {
        container.innerHTML = '<div style="padding:0.5rem;color:var(--text-light);font-size:0.8125rem;">No entries selected</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < selectedEntries.length; i++) {
        var s = selectedEntries[i];
        html += '<div class="entry-order-item" data-idx="' + i + '">';
        html += '<span style="color:var(--text-light);font-size:0.75rem;min-width:1.25rem;text-align:center;">' + (i + 1) + '</span>';
        html += '<span class="entry-order-item-title">' + escapeHtml(s.title) + '</span>';
        html += '<input type="text" class="entry-order-item-note" placeholder="Note..." value="' + escapeHtml(s.note) + '" data-idx="' + i + '">';
        if (i > 0) {
          html += '<button class="entry-order-btn" data-action="up" data-idx="' + i + '">&uarr;</button>';
        }
        if (i < selectedEntries.length - 1) {
          html += '<button class="entry-order-btn" data-action="down" data-idx="' + i + '">&darr;</button>';
        }
        html += '<button class="entry-order-btn entry-order-remove" data-action="remove" data-idx="' + i + '">&times;</button>';
        html += '</div>';
      }
      container.innerHTML = html;

      // Note inputs
      container.querySelectorAll('.entry-order-item-note').forEach(function(input) {
        input.addEventListener('input', function() {
          var idx = parseInt(input.getAttribute('data-idx'), 10);
          if (selectedEntries[idx]) {
            selectedEntries[idx].note = input.value;
          }
        });
      });

      // Order buttons
      container.querySelectorAll('.entry-order-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-idx'), 10);
          var action = btn.getAttribute('data-action');
          if (action === 'up' && idx > 0) {
            var tmp = selectedEntries[idx];
            selectedEntries[idx] = selectedEntries[idx - 1];
            selectedEntries[idx - 1] = tmp;
          } else if (action === 'down' && idx < selectedEntries.length - 1) {
            var tmp2 = selectedEntries[idx];
            selectedEntries[idx] = selectedEntries[idx + 1];
            selectedEntries[idx + 1] = tmp2;
          } else if (action === 'remove') {
            var removedId = selectedEntries[idx].id;
            selectedEntries.splice(idx, 1);
            // Uncheck in picker
            var cb = document.querySelector('#entryPickerList input[value="' + removedId + '"]');
            if (cb) cb.checked = false;
          }
          selectedEntries.forEach(function(s, i) { s.order = i + 1; });
          renderOrderList();
        });
      });
    }

    // Search handler
    document.getElementById('entryPickerSearch').addEventListener('input', debounce(function() {
      renderPickerEntries(document.getElementById('entryPickerSearch').value.trim());
    }, 200));

    // Render initial order list
    renderOrderList();

    // Cancel
    document.getElementById('lessonModalCancel').addEventListener('click', function() {
      overlay.remove();
    });

    // Click outside modal to close
    overlay.addEventListener('click', function(ev) {
      if (ev.target === overlay) overlay.remove();
    });

    // Save
    document.getElementById('lessonModalSave').addEventListener('click', async function() {
      var title = document.getElementById('lessonTitleInput').value.trim();
      if (!title) {
        alert('Title is required');
        return;
      }

      var body = {
        title: title,
        description: document.getElementById('lessonDescInput').value.trim() || undefined,
        entries: selectedEntries.map(function(s) {
          return { entry_id: s.id, order: s.order, note: s.note || undefined };
        })
      };

      try {
        var saveBtn = document.getElementById('lessonModalSave');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        var url, method;
        if (isEdit) {
          url = '/api/lessons/' + encodeURIComponent(existingLesson.id);
          method = 'PUT';
        } else {
          url = '/api/lessons';
          method = 'POST';
        }

        var resp = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!resp.ok) {
          var errData = await resp.json().catch(function() { return {}; });
          throw new Error(errData.error || 'Save failed');
        }

        overlay.remove();

        // Refresh
        if (isEdit) {
          await renderLessonDetail(existingLesson.id);
        } else {
          await renderLessonList();
        }
      } catch (err) {
        alert('Error: ' + err.message);
        var saveBtn2 = document.getElementById('lessonModalSave');
        if (saveBtn2) {
          saveBtn2.disabled = false;
          saveBtn2.textContent = isEdit ? 'Save' : 'Create';
        }
      }
    });
  }

  // ---- Hash-based routing ----
  function handleRoute() {
    const hash = window.location.hash || '#/';
    const detailMatch = hash.match(/^#\/entry\/(.+)$/);
    const lessonEntryMatch = hash.match(/^#\/lessons\/([^/]+)\/entries\/([^/]+)$/);
    const lessonDetailMatch = hash.match(/^#\/lessons\/([^/]+)$/);

    if (hash === '#/settings') {
      state.currentView = 'settings';
      state.currentMode = 'entries';
      state.lessonContext = null;
      document.querySelector('.app-layout').classList.remove('lessons-mode');
      restoreFilterSidebar();
      renderSettings();
    } else if (hash === '#/lessons') {
      state.lessonContext = null;
      restoreFilterSidebar();
      renderLessonList();
    } else if (lessonEntryMatch) {
      var lessonId = decodeURIComponent(lessonEntryMatch[1]);
      var entryId = decodeURIComponent(lessonEntryMatch[2]);

      // Set up lesson context then fetch entry detail
      (async function() {
        // Use cached lessonDetail if it matches, otherwise fetch
        if (!state.lessonDetail || state.lessonDetail.id !== lessonId) {
          try {
            var resp = await fetch('/api/lessons/' + encodeURIComponent(lessonId));
            if (!resp.ok) throw new Error('Lesson not found');
            state.lessonDetail = await resp.json();
          } catch (e) {
            state.lessonDetail = null;
          }
        }

        if (state.lessonDetail && state.lessonDetail.entries) {
          state.lessonContext = {
            lessonId: lessonId,
            lessonTitle: state.lessonDetail.title,
            entries: state.lessonDetail.entries.map(function(e) { return { entry_id: e.entry.id, order: e.order }; }),
            currentIndex: state.lessonDetail.entries.findIndex(function(e) { return e.entry.id === entryId; })
          };
        }

        state.currentMode = 'lessons';
        document.querySelector('.app-layout').classList.add('lessons-mode');
        updateViewSwitcher('lessons');

        // Render lesson outline in sidebar with active entry highlighted
        await fetchLessons();
        renderLessonSidebar(state.lessonDetail, entryId);

        fetchDetail(entryId);
      })();
    } else if (lessonDetailMatch) {
      state.lessonContext = null;
      var lessonId2 = decodeURIComponent(lessonDetailMatch[1]);
      renderLessonDetail(lessonId2);
    } else if (detailMatch) {
      const id = decodeURIComponent(detailMatch[1]);
      state.currentMode = 'entries';
      state.lessonContext = null;
      document.querySelector('.app-layout').classList.remove('lessons-mode');
      restoreFilterSidebar();
      sidebar.classList.remove('hidden');
      updateViewSwitcher('entries');
      fetchDetail(id);
    } else {
      state.currentView = 'list';
      state.currentMode = 'entries';
      state.detailEntry = null;
      state.lessonContext = null;
      document.querySelector('.app-layout').classList.remove('lessons-mode');
      restoreFilterSidebar();
      sidebar.classList.remove('hidden');
      updateViewSwitcher('entries');
      render();
    }
  }

  window.addEventListener('hashchange', handleRoute);

  // ---- Init ----
  checkQAStatus();
  fetchAllTopics();
  fetchConversationList();

  // Load progress data
  fetch('/api/progress')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      state.learnedEntries = data.learned_entries || {};
      render();
    })
    .catch(function () {
      state.learnedEntries = {};
    });

  // Check default view config before initial route
  fetch('/api/config')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      // If no hash set and default_view is lessons, navigate there
      if ((!window.location.hash || window.location.hash === '#/') && config.default_view === 'lessons') {
        window.location.hash = '#/lessons';
      }
    })
    .catch(function() {})
    .then(function() {
      return fetchEntries();
    })
    .then(function() {
      handleRoute();
    });

})();
</script>
</body>
</html>
